services:
  - type: web
    name: infinite-canvas
    runtime: docker
    plan: free
    autoDeployTrigger: off
    healthCheckPath: /api/health
    envVars:
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_HOURS
        value: 168
      - key: PORT
        value: 3000
      - key: STORAGE_DRIVER
        value: sqlite
      - key: DATABASE_DSN
        value: data/infinite-canvas.db
